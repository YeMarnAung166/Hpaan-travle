    - main [ref=f12e69]:
      - generic [ref=f12e142]:
        - generic [ref=f12e145]:
          - heading "The Story of Hpa‑An" [level=1] [ref=f12e146]
          - paragraph [ref=f12e147]: Land of Limestone Mountains and Ancient Legends
        - generic [ref=f12e148]:
          - generic [ref=f12e149]:
            - heading "Ancient Origins" [level=2] [ref=f12e150]
            - paragraph [ref=f12e151]: Hpa‑An, the capital of Kayin State, has been inhabited for over a thousand years. According to legend, the name comes from "Hpa" (cliff) and "An" (to swallow) – referring to the mythical giant who swallowed a cliff.
          - generic [ref=f12e152]:
            - heading "Colonial Era" [level=2] [ref=f12e153]
            - paragraph [ref=f12e154]: During British colonial rule, Hpa‑An grew as an administrative center. The British built a network of roads and railways, connecting the town to Yangon and Mawlamyine.
          - generic [ref=f12e155]:
            - heading "Spiritual Heart" [level=2] [ref=f12e156]
            - paragraph [ref=f12e157]: The region is dotted with hundreds of Buddhist caves, pagodas, and meditation centers. Saddan Cave, with its hidden lake and reclining Buddha, is a testament to the deep spiritual significance of the landscape.
          - generic [ref=f12e158]:
            - heading "Modern Times" [level=2] [ref=f12e159]
            - paragraph [ref=f12e160]: Today, Hpa‑An is a growing eco-tourism destination. Travelers come to hike Mount Zwegabin, explore the Thanlwin River, and experience Kayin culture.
          - generic [ref=f12e161]:
            - heading "Key Moments in History" [level=2] [ref=f12e162]
            - generic [ref=f12e163]:
              - generic [ref=f12e166]:
                - text: 11th century
                - paragraph [ref=f12e167]: First settlements by Mon and Kayin people
              - generic [ref=f12e170]:
                - text: "1886"
                - paragraph [ref=f12e171]: British annexation, Hpa‑An becomes district headquarters
              - generic [ref=f12e174]:
                - text: "1948"
                - paragraph [ref=f12e175]: Myanmar independence, Hpa‑An capital of Kayin State
